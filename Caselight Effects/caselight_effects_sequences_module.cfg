#####################################################################
# CASELIGHT EFFECTS - PREDEFINED SEQUENCES (Copy/Paste Macro Ready)
# Version: 1.0
# Last Updated: 2026-07-12
# Author: MoistDreams + AI Assistant
# Description:
#   This module provides a set of predefined lighting sequences for the
#   Caselight Effects system.
#   Each sequence is implemented as a G-code macro that can be called from
#   the slicer or manually during a print.
#   Included sequences cover print start, print completion, error alerts,
#   subtle notifications, attention alerts, ambient modes, emergency stop
#   indication, preheat completion, and long-duration ambient lighting.
#   Users can also create custom sequences using the provided template.

# Dependency:
#   Requires caselight_effects_core_module.cfg to be included/loaded first.
#####################################################################

# ===========================================================================
# 1. QUICK REFERENCE
# ===========================================================================

# Available sequences (copy & paste):
#   PRINT_START_LIGHTS      - Dramatic print start
#   PRINT_DONE_CELEBRATION  - Print completion celebration
#   ERROR_ALERT             - Error notification
#   NOTIFICATION_SUBTLE     - Gentle notification
#   ATTENTION_NEEDED        - Get user attention
#   AMBIENT_CALM            - Calm ambient mode
#   EMERGENCY_STOP_LIGHTS   - Emergency stop
#   PREHEAT_DONE            - Preheat complete
#   AMBIENT_LONG            - Extended ambient mode
#   STARTUP_LIGHTS          - Morning/startup
#   WIND_DOWN_LIGHTS        - Evening wind-down
#
# Note:
#   STARTUP_LIGHTS and WIND_DOWN_LIGHTS are macro's designed for automated daily routines and can be scheduled or triggered as needed from moonraker smart home intergrations.

# Example usage:
#   PRINT_START_LIGHTS              # Run print start sequence
#   ERROR_ALERT                     # Run error alert
#   AMBIENT_LONG                    # Run long ambient mode

# ===========================================================================
# 2. SEQUENCE EFFECTS
# ===========================================================================
# ===========================================================================
# Sequence 1: Print Start Sequence
# ===========================================================================
# Description: Dramatic lights down, then ambient pulsing during print
# Duration: ~8 seconds
# Best for: Starting a print, creating focus atmosphere
[gcode_macro PRINT_START_LIGHTS]
description: Lighting sequence for print start
gcode:
  RESPOND TYPE=echo MSG="Starting print lighting sequence..."
  
  ; Lights down dramatically
  FADE_CASELIGHT PULSES=1
  G4 P500
  
  ; Pause at dim
  G4 P1000
  
  ; Gentle ambient pulse while printing
  WAVE_SMOOTH_CASELIGHT PULSES=5
  G4 P500
  
  ; Return to full brightness
  SET_PIN PIN=caselight VALUE=1
  RESPOND TYPE=echo MSG="Print lighting sequence complete"

# ===========================================================================
# Sequence 2: Print Complete
# ===========================================================================
# Description: Exciting notification that print is done
# Duration: ~10 seconds
# Best for: Print completion, success notification
[gcode_macro PRINT_DONE_CELEBRATION]
description: Celebratory lighting for print completion
gcode:
  RESPOND TYPE=echo MSG="Print complete! Lighting celebration..."
  
  ; Attention grabber - 3 fast heartbeats
  HEARTBEAT_CASELIGHT BEATS=3
  G4 P500
  
  ; Brief pause
  G4 P500
  
  ; Smooth celebration waves
  WAVE_SMOOTH_CASELIGHT PULSES=5
  G4 P500
  
  ; Final heartbeat
  HEARTBEAT_CASELIGHT BEATS=2
  G4 P500
  
  SET_PIN PIN=caselight VALUE=1
  RESPOND TYPE=echo MSG="Celebration complete"

# ===========================================================================
# Sequence 3: Error Alert
# ===========================================================================
# Description: Urgent alert pattern for errors
# Duration: ~6 seconds (repeats)
# Best for: Errors, filament runout, thermal issues
[gcode_macro ERROR_ALERT]
description: Urgent error alert lighting
gcode:
  RESPOND TYPE=echo MSG="ERROR ALERT! Check printer!"
  
  ; 3 sets of rapid heartbeats
  HEARTBEAT_CASELIGHT BEATS=3
  G4 P300
  HEARTBEAT_CASELIGHT BEATS=3
  G4 P300
  HEARTBEAT_CASELIGHT BEATS=3
  G4 P500
  
  ; Pause with slow pulse
  PULSE_CASELIGHT PULSES=2 DURATION=1500
  G4 P500
  
  ; Repeat alert
  HEARTBEAT_CASELIGHT BEATS=3
  G4 P300
  HEARTBEAT_CASELIGHT BEATS=3
  
  SET_PIN PIN=caselight VALUE=1
  RESPOND TYPE=echo MSG="Alert complete - check printer"

# ===========================================================================
# Sequence 4: Notification (Subtle)
# ===========================================================================
# Description: Gentle notification, not intrusive
# Duration: ~4 seconds
# Best for: Layer complete, progress updates
[gcode_macro NOTIFICATION_SUBTLE]
description: Gentle notification lighting
gcode:
  RESPOND TYPE=echo MSG="Subtle notification..."
  
  ; Single gentle pulse
  PULSE_CASELIGHT PULSES=1 DURATION=1500
  G4 P500
  
  ; One smooth wave
  WAVE_SMOOTH_CASELIGHT PULSES=1
  G4 P500
  
  SET_PIN PIN=caselight VALUE=1

# ===========================================================================
# Sequence 5: Attention Needed
# ===========================================================================
# Description: Get user's attention immediately
# Duration: ~5 seconds
# Best for: User required actions, prompts
[gcode_macro ATTENTION_NEEDED]
description: High attention grabbing sequence
gcode:
  RESPOND TYPE=echo MSG="ATTENTION NEEDED!"
  
  ; Fast dramatic fades
  FADE_CASELIGHT PULSES=2
  G4 P300
  
  ; Rapid heartbeats
  HEARTBEAT_CASELIGHT BEATS=5
  G4 P300
  
  ; Final pulse
  HEARTBEAT_CASELIGHT BEATS=3
  
  SET_PIN PIN=caselight VALUE=1
  RESPOND TYPE=echo MSG="Attention sequence complete"

# ===========================================================================
# Sequence 6: Ambient Mode (Calm)
# ===========================================================================
# Description: Continuous calming ambient effect
# Duration: ~30 seconds
# Best for: Long prints, focus mode, ambient lighting
[gcode_macro AMBIENT_CALM]
description: Calm ambient lighting mode
gcode:
  RESPOND TYPE=echo MSG="Starting calm ambient mode..."
  
  ; Slow, gentle pulses
  PULSE_CASELIGHT PULSES=5 DURATION=2000
  G4 P1000
  
  ; Smooth waves
  WAVE_SMOOTH_CASELIGHT PULSES=10
  G4 P1000
  
  ; More slow pulses
  PULSE_CASELIGHT PULSES=5 DURATION=2000
  G4 P1000
  
  SET_PIN PIN=caselight VALUE=1
  RESPOND TYPE=echo MSG="Ambient mode complete"

# ===========================================================================
# Sequence 7: Emergency Stop
# ===========================================================================
# Description: Clear visual indication of emergency stop
# Duration: ~3 seconds
# Best for: Emergency stops, critical failures
[gcode_macro EMERGENCY_STOP_LIGHTS]
description: Emergency stop lighting
gcode:
  RESPOND TYPE=echo MSG="EMERGENCY STOP ACTIVATED!"
  
  ; Quick flash to off
  SET_PIN PIN=caselight VALUE=1
  G4 P100
  SET_PIN PIN=caselight VALUE=0
  G4 P100
  SET_PIN PIN=caselight VALUE=1
  G4 P100
  SET_PIN PIN=caselight VALUE=0
  G4 P100
  SET_PIN PIN=caselight VALUE=1
  G4 P100
  SET_PIN PIN=caselight VALUE=0
  G4 P500
  
  ; Slow fade up and down
  FADE_CASELIGHT PULSES=1
  G4 P500
  
  ; Keep on full for visibility
  SET_PIN PIN=caselight VALUE=1

# ===========================================================================
# Sequence 8: Preheat Notification
# ===========================================================================
# Description: Alert when preheat is complete
# Duration: ~5 seconds
# Best for: Preheat complete, target temperature reached
[gcode_macro PREHEAT_DONE]
description: Preheat complete notification
gcode:
  RESPOND TYPE=echo MSG="Preheat complete!"
  
  ; Quick pulses to get attention
  HEARTBEAT_CASELIGHT BEATS=2
  G4 P300
  
  ; Celebration waves
  WAVE_CASELIGHT PULSES=3
  G4 P300
  
  ; Final heartbeat
  HEARTBEAT_CASELIGHT BEATS=2
  
  SET_PIN PIN=caselight VALUE=1

# ===========================================================================
# Sequence 9: Long Duration Ambient
# ===========================================================================
# Description: Extended ambient mode for long prints
# Duration: ~2-5 minutes (can be extended)
# Best for: Long prints, ambient lighting
[gcode_macro AMBIENT_LONG]
description: Extended ambient lighting mode
gcode:
  RESPOND TYPE=echo MSG="Starting long ambient mode..."
  
  ; 3 cycles of calm pulses
  {% for cycle in range(3) %}
    PULSE_CASELIGHT PULSES=5 DURATION=1500
    G4 P1000
    WAVE_SMOOTH_CASELIGHT PULSES=5
    G4 P1000
    RESPOND TYPE=echo MSG="Ambient cycle {cycle+1}/3 complete"
  {% endfor %}
  
  SET_PIN PIN=caselight VALUE=1
  RESPOND TYPE=echo MSG="Long ambient mode complete"
  
# ===========================================================================
# Sequence 10: Startup Lights
# ===========================================================================
# Description: Morning/startup lighting sequence
# Duration: ~2 Seconds (can be extended)
# Best for: Long prints, ambient lighting
[gcode_macro STARTUP_LIGHTS]
description: Morning/Startup lighting sequence
gcode:
  ; Gentle wake-up
  PULSE_CASELIGHT PULSES=3 DURATION=2000
  G4 P1000
  FADE_CASELIGHT PULSES=1
  G4 P1000
  WAVE_SMOOTH_CASELIGHT PULSES=5
  SET_PIN PIN=caselight VALUE=1

# ===========================================================================
# Sequence 11: Wind Down Lights
# ===========================================================================
# Description: Wind-down lighting sequence for evening
# Duration: ~3 Seconds (can be extended)
# Best for: Dusk, evening wind-down, ambient lighting
[gcode_macro WIND_DOWN_LIGHTS]
description: Evening wind-down lighting sequence
gcode:
  ; Slow calming effect
  PULSE_CASELIGHT PULSES=5 DURATION=3000
  G4 P2000
  FADE_CASELIGHT PULSES=1
  G4 P2000
  WAVE_SMOOTH_CASELIGHT PULSES=3
  G4 P2000
  ; End at dim for night
  SET_PIN PIN=caselight VALUE=0.2

# ===========================================================================
# CUSTOM SEQUENCE TEMPLATES
# Use this template to build your own sequences
# ===========================================================================
# [gcode_macro YOUR_SEQUENCE_NAME]
# description: Description of your sequence
# gcode:
#   RESPOND TYPE=echo MSG="Starting sequence..."
#   
#   ; Effect 1 - Attention grabber
#   EFFECT1
#   G4 P500
#   
#   ; Effect 2 - Main effect
#   EFFECT2
#   G4 P500
#   
#   ; Effect 3 - Conclusion
#   EFFECT3
#   G4 P500
#   
#   ; Clean up
#   SET_PIN PIN=caselight VALUE=1
#   RESPOND TYPE=echo MSG="Sequence complete"
# ===========================================================================
# END OF MODULE
# ===========================================================================
