#####################################################################
# CASELIGHT EFFECTS CORE MODULE - DOCUMENTATION
# Version: 1.1
# Last Updated: 2026-07-12
# Author: MoistDreams + AI Assistant
#####################################################################
#
# PURPOSE
#   Core lighting effect macros for Klipper caselight control.
#   This file defines reusable effects intended to be called directly
#   or chained by sequence macros in a separate module.
#
# AVAILABLE MACROS
#   HEARTBEAT_CASELIGHT
#     Best use: alerts and notifications with a "lub-dub" rhythm.
#   FADE_CASELIGHT
#     Best use: dramatic transitions and cinema-style dimming.
#   WAVE_CASELIGHT
#     Best use: ambient motion with triangular wave behavior.
#   WAVE_SMOOTH_CASELIGHT
#     Best use: softer ambient motion with sine-like behavior.
#   PULSE_CASELIGHT
#     Best use: breathing-style status indicators.
#
# COMMON PARAMETERS
#   BEATS
#     Number of heartbeat cycles (HEARTBEAT_CASELIGHT only).
#   PULSES
#     Number of pulse/fade/wave cycles (all non-heartbeat macros).
#   DURATION
#     Time per pulse in milliseconds (PULSE_CASELIGHT only).
#
# QUICK EXAMPLES
#   PULSE_CASELIGHT
#     Runs 3 normal breaths at 1000 ms each (default).
#   PULSE_CASELIGHT PULSES=5 DURATION=1500
#     Runs 5 slower breaths.
#   FADE_CASELIGHT PULSES=1
#     Runs a single dramatic fade cycle.
#   HEARTBEAT_CASELIGHT BEATS=3
#     Runs 3 heartbeat cycles.
#   WAVE_CASELIGHT PULSES=10
#     Runs 10 triangular waves.
#   WAVE_SMOOTH_CASELIGHT PULSES=5
#     Runs 5 smooth sine-like waves.
#
# TECHNICAL NOTES
#   HEARTBEAT_CASELIGHT
#     Approx steps/cycle: 12
#     Approx cycle time: 420 ms
#     Curve: linear
#   FADE_CASELIGHT
#     Approx steps/cycle: 100
#     Approx cycle time: 3.4 s
#     Curve: linear
#   WAVE_CASELIGHT
#     Approx steps/cycle: 60
#     Approx cycle time: 1.0 s
#     Curve: triangular
#   WAVE_SMOOTH_CASELIGHT
#     Approx steps/cycle: 36
#     Approx cycle time: 1.0 s
#     Curve: precomputed sine approximation
#   PULSE_CASELIGHT
#     Approx steps/cycle: 40
#     Approx cycle time: configurable
#     Curve: quadratic easing
#
# WAVE MODE GUIDANCE
#   WAVE_CASELIGHT
#     Faster and slightly sharper transitions.
#   WAVE_SMOOTH_CASELIGHT
#     Softer and more natural transitions.
#   Recommendation
#     Use WAVE_SMOOTH_CASELIGHT for ambient lighting and
#     WAVE_CASELIGHT for quick visual feedback.
#
# DURATION ESTIMATES
#   HEARTBEAT_CASELIGHT
#     ~0.5 s per beat
#   FADE_CASELIGHT
#     ~3.4 s per pulse
#   WAVE_CASELIGHT
#     ~1.0 s per wave
#   WAVE_SMOOTH_CASELIGHT
#     ~1.0 s per wave
#   PULSE_CASELIGHT
#     Controlled by DURATION
#
# EXAMPLE TOTALS
#   HEARTBEAT_CASELIGHT BEATS=10
#     ~5 seconds total
#   FADE_CASELIGHT PULSES=3
#     ~10 seconds total
#   PULSE_CASELIGHT PULSES=5 DURATION=2000
#     ~10 seconds total
#
# CHAINING EXAMPLES
#   [gcode_macro NOTIFICATION]
#   gcode:
#     HEARTBEAT_CASELIGHT BEATS=3
#     G4 P1000
#     PULSE_CASELIGHT PULSES=2 DURATION=500
#
#   [gcode_macro PRINT_START_ALERT]
#   gcode:
#     FADE_CASELIGHT PULSES=1
#     G4 P500
#     WAVE_SMOOTH_CASELIGHT PULSES=3
#
#   [gcode_macro PRINT_DONE_ALERT]
#   gcode:
#     HEARTBEAT_CASELIGHT BEATS=5
#     G4 P1000
#     PULSE_CASELIGHT PULSES=3 DURATION=500
#
# KNOWN LIMITATIONS
#   1. Macros are blocking during execution.
#   2. Recommended maximum PULSES is 20.
#   3. Very long effects (>30 seconds) should be split into smaller chains.
#   4. Effects can be interrupted by emergency stops or power loss.
#   5. PWM frequency is controlled by cycle_time in output_pin config.
#      Current reference: cycle_time=0.0100 (100 Hz).
#
# MAINTENANCE NOTES
#   To add a new effect:
#     1. Copy an existing macro as a template.
#     2. Rename and modify the sequence.
#     3. Add it to the reference section above.
#     4. Test with small pulse counts first (1 to 3).
#
#   To adjust timing:
#     - Edit G4 P{value} delays.
#     - Increase steps for smoother transitions.
#     - Decrease steps for faster transitions.
#
#   To change brightness range:
#     - Adjust VALUE calculations from 0.0 to 1.0 as needed.
#     - Example: VALUE={brightness * 0.8} for 80 percent max brightness.
#####################################################################

#--------------------------------------------------------------------
# CORE EFFECT BEGIN
#--------------------------------------------------------------------
#####################################################################
# MACRO: HEARTBEAT_CASELIGHT
#####################################################################
[gcode_macro HEARTBEAT_CASELIGHT]
description: Heartbeat-style pulse with double-beat rhythm
gcode:
  {% set beats = params.BEATS|default(5)|int %}
  
  {% for beat in range(beats) %}
    ; Primary beat (strong pulse)
    ; Quick flash up - 5 steps to full brightness
    {% for step in range(5) %}
      SET_PIN PIN=caselight VALUE={step / 5}
      G4 P10  ; 10ms per step = 50ms total rise time
    {% endfor %}
    
    ; Quick flash down - 5 steps back to off
    {% for step in range(5, 0, -1) %}
      SET_PIN PIN=caselight VALUE={step / 5}
      G4 P10  ; 10ms per step = 50ms total fall time
    {% endfor %}
    
    ; Brief pause between beats (diastole)
    G4 P50  ; 50ms pause
    
    ; Secondary smaller pulse (weaker ventricular contraction)
    ; 3-step pulse at 60% brightness for realistic "lub-dub" feel
    {% for step in range(3) %}
      SET_PIN PIN=caselight VALUE={step / 3 * 0.6}
      G4 P10  ; 10ms per step = 30ms total
    {% endfor %}
    {% for step in range(3, 0, -1) %}
      SET_PIN PIN=caselight VALUE={step / 3 * 0.6}
      G4 P10  ; 10ms per step = 30ms total
    {% endfor %}
    
    ; Long pause between complete heartbeats
    G4 P300  ; 300ms rest for realistic heart rate (~60 BPM)
  {% endfor %}
  
  SET_PIN PIN=caselight VALUE=1  ; Restore to full brightness
  
#####################################################################
# MACRO: FADE_CASELIGHT
#####################################################################
[gcode_macro FADE_CASELIGHT]
description: Slow dramatic pulse like cinema dimming
gcode:
  {% set pulses = params.PULSES|default(2)|int %}
  
  {% for pulse in range(pulses) %}
    ; Very slow fade out - cinematic descent into darkness
    ; 50 steps from bright to off for smooth transition
    {% for step in range(50) %}
      {% set brightness = 1 - (step / 50) %}
      SET_PIN PIN=caselight VALUE={brightness}
      G4 P30  ; 30ms per step = 1.5s total fade-out time
    {% endfor %}
    
    ; Pause at dark - dramatic tension
    G4 P200  ; 200ms at minimum brightness
    
    ; Very slow fade in - gradual reveal
    ; 50 steps from off to bright for smooth transition
    {% for step in range(50) %}
      {% set brightness = step / 50 %}
      SET_PIN PIN=caselight VALUE={brightness}
      G4 P30  ; 30ms per step = 1.5s total fade-in time
    {% endfor %}
    
    ; Pause at bright - settle at full illumination
    G4 P200  ; 200ms at maximum brightness
  {% endfor %}
  
  SET_PIN PIN=caselight VALUE=1  ; Ensure full brightness
  
#####################################################################
# MACRO: WAVE_CASELIGHT
#####################################################################
[gcode_macro WAVE_CASELIGHT]
description: Smooth triangular wave pulse (sin approximation)
gcode:
  {% set pulses = params.PULSES|default(3)|int %}
  {% set total_steps = 60 %}  ; 60 steps per full cycle
  
  {% for pulse in range(pulses) %}
    ; Triangular wave: up for 30 steps, down for 30 steps
    ; This approximates a sine wave without needing sin() function
    {% for step in range(total_steps) %}
      {% if step < 30 %}
        ; Rising phase - linear increase from 0 to 1
        {% set brightness = step / 30 %}
      {% else %}
        ; Falling phase - linear decrease from 1 to 0
        {% set brightness = (60 - step) / 30 %}
      {% endif %}
      SET_PIN PIN=caselight VALUE={brightness}
      G4 P{1000 // total_steps}  ; ~16.67ms per step for 1s cycle
    {% endfor %}
  {% endfor %}
  
  SET_PIN PIN=caselight VALUE=1  ; Restore to full brightness
  
#####################################################################
# MACRO: WAVE_SMOOTH_CASELIGHT
#####################################################################
[gcode_macro WAVE_SMOOTH_CASELIGHT]
description: Smoother sinusoidal wave using pre-calculated values
gcode:
  {% set pulses = params.PULSES|default(3)|int %}
  
  {% for pulse in range(pulses) %}
    ; Pre-calculated sine wave approximation (0 to 1 and back)
    ; Values sampled from sin() at 10-degree intervals (36 steps)
    {% set sine_values = [0.0, 0.17, 0.34, 0.50, 0.64, 0.77, 0.87, 0.94, 0.98, 1.0,
                          0.98, 0.94, 0.87, 0.77, 0.64, 0.50, 0.34, 0.17, 0.0, -0.17,
                          -0.34, -0.50, -0.64, -0.77, -0.87, -0.94, -0.98, -1.0, -0.98,
                          -0.94, -0.87, -0.77, -0.64, -0.50, -0.34, -0.17] %}
    
    {% for value in sine_values %}
      ; Map from -1..1 to 0..1 brightness
      {% set brightness = (value + 1) / 2 %}
      SET_PIN PIN=caselight VALUE={brightness}
      G4 P28  ; ~28ms per step = ~1 second per full cycle
    {% endfor %}
  {% endfor %}
  
  SET_PIN PIN=caselight VALUE=1  ; Restore to full brightness
  
#####################################################################
# MACRO: PULSE_CASELIGHT
#####################################################################
[gcode_macro PULSE_CASELIGHT]
description: Smooth breathing pulse effect with quadratic easing
gcode:
  {% set pulses = params.PULSES|default(3)|int %}
  {% set duration = params.DURATION|default(1000)|int %}  ; Total time per pulse in ms
  
  {% for pulse in range(pulses) %}
    ; Fade in - quadratic ease-out for smooth start
    ; Starts fast, decelerates to max for natural feel
    {% for step in range(20) %}
      {% set brightness = (1 - (step / 20) * (step / 20))|float %}  ; Quadratic ease-out
      SET_PIN PIN=caselight VALUE={brightness}
      G4 P{duration // 40}  ; 25% of total duration (20 steps = 25%)
    {% endfor %}
    
    ; Hold at max briefly - subtle pause at peak brightness
    SET_PIN PIN=caselight VALUE=1
    G4 P{duration // 10}  ; 10% of duration at max brightness
    
    ; Fade out - quadratic ease-in for smooth end
    ; Starts slow, accelerates to min for natural decay
    {% for step in range(20) %}
      {% set brightness = ((20 - step) / 20) * ((20 - step) / 20)|float %}  ; Quadratic ease-in
      SET_PIN PIN=caselight VALUE={brightness}
      G4 P{duration // 40}  ; 25% of total duration (20 steps = 25%)
    {% endfor %}
    
    ; Hold at min briefly - pause between breaths
    SET_PIN PIN=caselight VALUE=0
    G4 P{duration // 20}  ; 5% of duration at min brightness
  {% endfor %}
  
  SET_PIN PIN=caselight VALUE=1  ; Return to full brightness
#--------------------------------------------------------------------
# CORE EFFECT GCODE END
#--------------------------------------------------------------------