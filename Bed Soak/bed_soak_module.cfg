# ============================================================
# Module: Bed Soak
# Macro: BED_SOAK
# Author: MoistDreams + AI Assistant
# Version: 1.3
# Last Updated: 2026-07-24
# Description:
#   This macro implements an adaptive bed soak routine for 3D printing.
#   It waits for the heated bed to reach a target temperature floor and then
#   holds it for a material-specific soak duration to ensure thermal stability.
#   The soak duration is determined based on the material type and soak target temperature.
#   This is particularly useful for materials that benefit from a stable bed temperature
#   before starting the print, such as ABS, PETG, and other high-temperature filaments.
#
# Expected Params which should be passed from slicer or manually:
#   MATERIAL=<string>        Example: PLA, PLA+, PETG-CF, ABS
#   BED_TEMP=<int>           Preferred explicit soak target temperature in C
#   bed_target_temp=<int>    Optional soak target alias for start macro compatibility
#   FORCE_SOAK=<bool-string> True/False, forces soak when True
#
# Developer Notes:
#   - Keep this macro side-effect free except status messages and wait.
#   - Preserve defaults to avoid slicer compatibility regressions.
#   - Soak temperature resolution order: BED_TEMP -> bed_target_temp -> heater_bed.target -> 60C.
#   - Waiting uses a minimum-threshold check (no upper clamp) to avoid oscillation stalls.
#   - Material matching intentionally uses substring checks for variants.
#   - Macro execution is blocking while soak is active; queued console commands run afterward.
# ============================================================

[gcode_macro BED_SOAK]
description: Wait for bed to thermally stabilize based on material type
gcode:
    # Input parsing: normalize common slicer inputs and apply safe defaults.
    # Resolve soak temperature from explicit params first, then current heater target.
    {% set raw_material = params.MATERIAL|default("PLA")|upper %}
    {% set bed_soak_temp = params.BED_TEMP|default(params.BED_TARGET_TEMP|default(printer.heater_bed.target|default(60)))|int %}
    
    # DEBUG: Uncomment to see what's being passed
    # RESPOND TYPE=command MSG="DEBUG: MATERIAL={raw_material}, BED_SOAK_TEMP={bed_soak_temp}"
    
    # If bed_soak_temp is 0 or less, something is wrong - use safe default
    {% if bed_soak_temp <= 0 %}
        {% set bed_soak_temp = 60 %}
        RESPOND TYPE=command MSG="WARNING: Invalid soak temperature, using 60°C"
    {% endif %}
    
    # FORCE_SOAK is string-based in macro params, normalize to a strict boolean.
    {% set force_soak = params.FORCE_SOAK|default("False")|lower == "true" %}
    
    # Material normalization maps families/variants to a canonical key.
    # Extract base material type (handle variants like PLA+, PLA-CF, etc.)
    {% if "PLA" in raw_material %}
        {% set material = "PLA" %}
    {% elif "PETG" in raw_material %}
        {% set material = "PETG" %}
    {% elif "TPU" in raw_material or "TPE" in raw_material %}
        {% set material = "TPU" %}
    {% elif "PVA" in raw_material %}
        {% set material = "PVA" %}
    {% elif "HIPS" in raw_material %}
        {% set material = "HIPS" %}
    {% elif "ABS" in raw_material %}
        {% set material = "ABS" %}
    {% elif "ASA" in raw_material %}
        {% set material = "ASA" %}
    {% elif "NYLON" in raw_material or "POLY" in raw_material %}
        {% set material = "NYLON" %}
    {% else %}
        {% set material = raw_material %}
    {% endif %}
    
    # Decision rule: soak for high-temp jobs, listed materials, or explicit FORCE_SOAK.
    # Determine if soak is needed from the resolved soak temperature or material.
    {% set high_temp_materials = ["PETG", "ABS", "ASA", "HIPS", "NYLON", "POLY"] %}
    {% set needs_soak = force_soak or bed_soak_temp >= 70 or material in high_temp_materials %}

    # Emit a concise decision message so "blocking" behavior is obvious in logs.
    {% if needs_soak %}
        RESPOND TYPE=command MSG="BED_SOAK active: material={raw_material}, target={bed_soak_temp}°C, force={force_soak}"
    {% else %}
        RESPOND TYPE=command MSG="BED_SOAK skipped: material={raw_material}, target={bed_soak_temp}°C, force={force_soak}"
    {% endif %}
    
    # --- SOAK LOGIC (wrapped in conditional) ---
    {% if needs_soak %}
    
        # Define reduced soak times
        {% if material == "PLA" %}
            {% set soak_ms = 90000 %}        # 1.5 minutes
        {% elif material == "PETG" %}
            {% set soak_ms = 120000 %}       # 2 minutes
        {% elif material == "TPU" %}
            {% set soak_ms = 90000 %}        # 1.5 minutes
        {% elif material == "PVA" %}
            {% set soak_ms = 90000 %}        # 1.5 minutes
        {% elif material == "HIPS" %}
            {% set soak_ms = 120000 %}       # 2 minutes
        {% elif material in ["ABS", "ASA"] %}
            {% set soak_ms = 150000 %}       # 2.5 minutes for high-temp materials
        {% elif material in ["NYLON", "POLY"] %}
            {% set soak_ms = 180000 %}       # 3 minutes for engineering materials
        {% else %}
            {% set soak_ms = 120000 %}       # 2 minutes (default)
        {% endif %}
        
        # Wait for the resolved soak temperature to stabilize first
        M117 Stabilizing bed at {bed_soak_temp}°C...
        RESPOND TYPE=command MSG="Stabilizing bed at {bed_soak_temp}°C (waiting until >= {bed_soak_temp - 0.5}°C)"
        
        # Wait for the bed to reach the soak target floor.
        # Using only MINIMUM avoids long stalls from normal PID overshoot above target.
        TEMPERATURE_WAIT SENSOR="heater_bed" MINIMUM={bed_soak_temp - 0.5}
        
        # Convert to minutes for display
        {% set soak_minutes = (soak_ms / 60000)|round(1) %}
        
        # Display status and wait
        M117 Soaking bed: {soak_minutes}min ({raw_material})
        RESPOND TYPE=command MSG="Bed soaking for {soak_minutes} minutes ({raw_material})"
        G4 P{soak_ms}
        
        M117 Soak complete
        RESPOND TYPE=command MSG="Bed soak complete"
        
    {% else %}
        # Skip the soak
        M117 Skipping bed soak - not required
        RESPOND TYPE=command MSG="Skipping bed soak - not required for {raw_material} at {bed_soak_temp}°C"
    {% endif %}