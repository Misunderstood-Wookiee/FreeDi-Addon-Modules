# ============================================================
# Module: Adaptive Pressure Advance
# Macro: ADAPTIVE_PRESSURE_ADVANCE
# Author: MoistDreams + AI Assistant
# Version: 1.2
# Last Updated: 2026-07-12
# Description:
#   This macro implements an adaptive pressure advance routine for 3D printing.
#   It selects the appropriate pressure advance value based on slicer input,
#   material type, and nozzle diameter. If a slicer-provided value is present,
#   it will be used unless the FORCE parameter is set to True, in which case
#   the material default will be applied. The macro also applies nozzle scaling
#   to the default pressure advance value to account for different nozzle sizes.
#
# Expected Params which should be passed from slicer or manually:
#   PRESSURE_ADVANCE=<float>  Optional slicer-provided PA value
#   MATERIAL=<string>         Material profile name (e.g., PLA, PETG-CF)
#   NOZZLE=<float>            Nozzle diameter in mm (default 0.4)
#   FORCE=<bool-string>       True/False, force module defaults over slicer
#   SMOOTH_TIME=<float>       Pressure advance smoothing (default 0.040)
#
# Developer Notes:
#   - Preserve parameter precedence: slicer value wins unless FORCE=True.
#   - Material matching intentionally supports substring variants.
#   - Keep final clamp bounds aligned with printer-safe PA range.
# ============================================================

[gcode_macro ADAPTIVE_PRESSURE_ADVANCE]
description: Adpative pressure advance with slicer override and material defaults
gcode:
    # ----- GET PARAMETERS -----
    # Slicer inputs arrive as strings; normalize before calculations.
    {% set slicer_pa = params.PRESSURE_ADVANCE|default(None) %}
    {% set material = params.MATERIAL|default("PLA")|upper %}
    {% set nozzle_diam = params.NOZZLE|default(0.4)|float %}
    {% set force_pa = params.FORCE|default("False")|lower == "true" %}
    {% set smooth_time = params.SMOOTH_TIME|default(0.03)|float %}
    
    # ----- NORMALIZE MATERIAL NAME -----
    {% if "PLA" in material %}
        {% set base_material = "PLA" %}
    {% elif "PETG" in material %}
        {% set base_material = "PETG" %}
    {% elif "ABS" in material %}
        {% set base_material = "ABS" %}
    {% elif "ASA" in material %}
        {% set base_material = "ASA" %}
    {% elif "TPU" in material or "TPE" in material %}
        {% set base_material = "TPU" %}
    {% elif "NYLON" in material or "PA" in material and not "PETG" in material %}
        {% set base_material = "NYLON" %}
    {% elif "PC" in material or "POLY" in material %}
        {% set base_material = "POLYCARBONATE" %}
    {% elif "PVA" in material %}
        {% set base_material = "PVA" %}
    {% elif "HIPS" in material %}
        {% set base_material = "HIPS" %}
    {% else %}
        {% set base_material = "GENERIC" %}
    {% endif %}
    
    # ----- MATERIAL DEFAULTS (TUNE THESE FOR YOUR PRINTER) -----
    {% if base_material == "PLA" %}
        {% set default_pa = 0.042 %}
    {% elif base_material == "PETG" %}
        {% set default_pa = 0.086 %}
    {% elif base_material == "ABS" %}
        {% set default_pa = 0.035 %}
    {% elif base_material == "ASA" %}
        {% set default_pa = 0.035 %}
    {% elif base_material == "TPU" %}
        {% set default_pa = 0.15 %}
    {% elif base_material == "NYLON" %}
        {% set default_pa = 0.10 %}
    {% elif base_material == "POLYCARBONATE" %}
        {% set default_pa = 0.082 %}
    {% elif base_material == "PVA" %}
        {% set default_pa = 0.035 %}
    {% elif base_material == "HIPS" %}
        {% set default_pa = 0.035 %}
    {% else %}
        {% set default_pa = 0.035 %}
    {% endif %}
    
    # ----- NOZZLE DIAMETER ADJUSTMENT -----
    {% if nozzle_diam >= 0.8 %}
        {% set nozzle_factor = 0.6 %}
    {% elif nozzle_diam >= 0.6 %}
        {% set nozzle_factor = 0.8 %}
    {% elif nozzle_diam <= 0.2 %}
        {% set nozzle_factor = 1.5 %}
    {% else %}
        {% set nozzle_factor = 1.0 %}
    {% endif %}
    
    {% set adjusted_default = default_pa * nozzle_factor %}
    
    # ----- CHOOSE FINAL PA VALUE -----
    # Presence check is explicit so empty slicer values do not override defaults.
    {% set has_slicer_value = slicer_pa is not none and slicer_pa != "" %}
    
    {% if has_slicer_value and not force_pa %}
        {% set final_pa = slicer_pa|float %}
        {% set source = "slicer" %}
    {% else %}
        {% set final_pa = adjusted_default %}
        {% set source = "material default" %}
        {% if force_pa %}
            {% set source = source ~ " forced" %}
        {% endif %}
        {% if nozzle_factor != 1.0 %}
            {% set source = source ~ " nozzle: " ~ nozzle_diam|string %}
        {% endif %}
    {% endif %}
    
    # ----- SAFETY CHECKS -----
    # Clamp to a conservative range before applying to firmware.
    {% if final_pa < 0 %}
        {% set final_pa = 0.0 %}
    {% elif final_pa > 0.5 %}
        {% set final_pa = 0.5 %}
    {% endif %}

    # Keep smooth time in a safe range.
    {% if smooth_time <= 0 %}
        {% set smooth_time = 0.040 %}
    {% elif smooth_time > 0.2 %}
        {% set smooth_time = 0.2 %}
    {% endif %}
    
    # ----- FORMAT EVERYTHING FIRST (NO COLONS ANYWHERE) -----
    # Pre-formatting avoids repeated float conversion in UI and logs.
    {% set pa_formatted = "%.3f" % final_pa %}
    {% set smooth_formatted = "%.3f" % smooth_time %}
    {% set screen_msg = "PA: " ~ pa_formatted ~ " " ~ source %}
    
    # ----- SEND CONSOLE MESSAGES (USE action_respond_info WITH QUOTES) -----
    {% if has_slicer_value and not force_pa %}
        { action_respond_info("Using PA from slicer: " ~ pa_formatted) }
    {% elif has_slicer_value and force_pa %}
        { action_respond_info("FORCE: ignoring slicer, using: " ~ pa_formatted) }
    {% else %}
        { action_respond_info("No slicer PA, using default: " ~ pa_formatted) }
    {% endif %}
    
    {% if final_pa < 0 %}
        { action_respond_info("WARNING: Negative PA clamped to 0") }
    {% elif final_pa > 0.5 %}
        { action_respond_info("WARNING: PA > 0.5 clamped to 0.5") }
    {% endif %}
    
    { action_respond_info("Pressure Advance set to: " ~ pa_formatted ~ " source: " ~ source) }
    
    # ----- APPLY PRESSURE ADVANCE (BUILT-IN COMMAND) -----
    # Keep display and applied value in sync by reusing pa_formatted.
    M117 {screen_msg}
    SET_PRESSURE_ADVANCE ADVANCE={pa_formatted} SMOOTH_TIME={smooth_formatted}